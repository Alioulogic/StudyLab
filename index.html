<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Fiber Edu - Portal Educativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main Container -->
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="glass-card login-card">
                <h1 class="glow-text">Inicia Sesión</h1>
                <p>EduPortal Premium</p>
                <div class="form-group">
                    <label for="username">Usuario (admin / alumno)</label>
                    <input type="text" id="username" placeholder="Tu usuario">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña (admin / alumno)</label>
                    <input type="password" id="password" placeholder="Tu contraseña">
                </div>
                <button id="login-btn" class="primary-btn">Acceder</button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view hidden">
            <header class="glass-header">
                <div class="logo">
                    <h2>EduPortal <span class="accent">3D</span></h2>
                </div>
                <div class="user-info">
                    <span id="current-user-name"></span>
                    <button id="logout-btn" class="secondary-btn">Cerrar Sesión / Volver</button>
                </div>
            </header>

            <main class="dashboard-content">
                <!-- Navigation Tabs -->
                <nav class="tabs glass-tabs">
                    <button class="tab-btn active" data-target="schedules-section">
                        <img src="assets/schedule.png" alt="Horarios" class="tab-icon">
                        Horarios
                    </button>
                    <button class="tab-btn" data-target="grades-section">
                        <img src="assets/students.png" alt="Notas" class="tab-icon">
                        Notas y Asistencias
                    </button>
                    <!-- Teachers only tab -->
                    <button class="tab-btn hidden teacher-only" data-target="students-list-section">
                        <img src="assets/teachers.png" alt="Gestión" class="tab-icon">
                        Gestión de Alumnos
                    </button>
                </nav>

                <!-- Sections -->
                <!-- Schedules -->
                <section id="schedules-section" class="tab-content active">
                    <div class="glass-card full-width">
                        <h3>Horarios de Clase</h3>
                        <div id="schedule-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>
                </section>

                <!-- Grades & Attendances (For students mostly, or view mode) -->
                <section id="grades-section" class="tab-content hidden">
                    <div class="glass-card full-width">
                        <h3>Mis Notas y Asistencia</h3>
                        <div id="my-grades-container" class="grades-grid">
                            <!-- Dynamic Content -->
                        </div>
                    </div>
                </section>

                <!-- Management (Teacher only) -->
                <section id="students-list-section" class="tab-content hidden teacher-only">
                    <div class="glass-card full-width">
                        <h3>Gestión de Alumnado</h3>
                        <div id="management-container">
                            <!-- Dynamic Content -->
                        </div>
                    </div>
                </section>

            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
