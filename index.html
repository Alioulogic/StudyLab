<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Antigravity · Notas</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#111823;
      --text:#e7eefc;
      --muted:#a7b2c7;
      --good:#34d399;
      --warn:#fbbf24;
      --bad:#fb7185;
      --best:#60a5fa;
    }

    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
    header{
      position:sticky;top:0;z-index:10;
      background:rgba(10,14,20,.85);backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:14px 16px; display:flex; align-items:center; justify-content:space-between;
    }
    .brand{font-weight:700; letter-spacing:.4px}
    .btn{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:10px 12px;border-radius:12px;
      cursor:pointer; text-decoration:none; display:inline-flex; gap:8px; align-items:center;
    }
    .btn:hover{background:rgba(255,255,255,.1)}
    main{max-width:980px;margin:0 auto;padding:18px 16px 80px;}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    @media (min-width:900px){.grid{grid-template-columns:1.2fr .8fr}}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.09);
      border-radius:18px; padding:16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .card h2{margin:0 0 10px;font-size:18px}
    .muted{color:var(--muted);font-size:14px}

    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    th{color:var(--muted);font-weight:600;text-align:left;font-size:12px}
    td{padding:10px 10px;background:rgba(0,0,0,.25);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
    td:first-child{border-left:1px solid rgba(255,255,255,.06);border-radius:12px 0 0 12px}
    td:last-child{border-right:1px solid rgba(255,255,255,.06);border-radius:0 12px 12px 0}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06)}
    .right{display:flex;justify-content:flex-end}

    /* --- Tarjeta media --- */
    .avg-wrap{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .avg-score{font-size:44px;line-height:1;margin:6px 0 4px;font-weight:800}
    .avg-msg{margin:0;color:var(--muted)}
    .avg-badge{font-weight:700}

    /* --- Animaciones por rango --- */
    @keyframes pulse {0%,100%{transform:scale(1)} 50%{transform:scale(1.02)}}
    @keyframes shake {0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}}
    @keyframes blink {0%,100%{opacity:1} 50%{opacity:.6}}
    @keyframes glow {0%,100%{box-shadow:0 12px 30px rgba(0,0,0,.35)} 50%{box-shadow:0 12px 30px rgba(96,165,250,.30)}}
    @keyframes floaty {0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}

    .avg-bad {border-color: rgba(251,113,133,.35)}
    .avg-bad .avg-badge{color:var(--bad)}
    .avg-bad.anim {animation: shake .35s ease-in-out 2, blink 1s ease-in-out infinite}

    .avg-ok {border-color: rgba(251,191,36,.35)}
    .avg-ok .avg-badge{color:var(--warn)}
    .avg-ok.anim {animation: pulse 1.4s ease-in-out infinite}

    .avg-good {border-color: rgba(52,211,153,.35)}
    .avg-good .avg-badge{color:var(--good)}
    .avg-good.anim {animation: glow 1.6s ease-in-out infinite}

    .avg-excellent {border-color: rgba(96,165,250,.45)}
    .avg-excellent .avg-badge{color:var(--best)}
    .avg-excellent.anim {animation: glow 1.2s ease-in-out infinite}

    /* Confetti simple (sin librerías) */
    .confetti{
      position:absolute; inset:0; pointer-events:none;
      overflow:hidden;
    }
    .confetti span{
      position:absolute; top:-10px;
      width:8px;height:14px;border-radius:3px;
      opacity:.9;
      animation: fall 1.6s linear forwards;
    }
    @keyframes fall{
      to{ transform: translateY(120vh) rotate(320deg); opacity:0.9;}
    }

    /* Mini “sparkles” */
    .sparkle{
      position:absolute; right:14px; top:14px;
      font-size:18px; opacity:.9;
      animation: floaty 1.4s ease-in-out infinite;
    }

    /* Inputs demo */
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    input,select{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      padding:10px 12px;border-radius:12px;
      outline:none;
    }
    input{width:110px}
  </style>
</head>

<body>
<header>
  <div class="brand">Antigravity</div>
  <a class="btn" href="index.html">🏠 Inicio</a>
</header>

<main>
  <div class="grid">
    <section class="card">
      <h2>Notas</h2>
      <p class="muted">Ejemplo: cada nota tiene un peso. La media se calcula automáticamente.</p>

      <table aria-label="Tabla de notas">
        <thead>
          <tr>
            <th>Asignatura</th>
            <th>Tipo</th>
            <th>Nota</th>
            <th>Peso</th>
            <th class="right">Acción</th>
          </tr>
        </thead>
        <tbody id="gradesBody"></tbody>
      </table>

      <div class="row">
        <select id="subj">
          <option>Matemáticas</option>
          <option>Lengua</option>
          <option>Robótica</option>
        </select>
        <select id="type">
          <option value="Examen">Examen</option>
          <option value="Tarea">Tarea</option>
          <option value="Proyecto">Proyecto</option>
        </select>
        <input id="score" type="number" min="0" max="10" step="0.01" placeholder="Nota (0-10)" />
        <input id="weight" type="number" min="1" max="100" step="1" placeholder="Peso %" />
        <button class="btn" id="addBtn">➕ Añadir</button>
      </div>
    </section>

    <aside class="card" id="avgCard">
      <div class="sparkle" id="sparkle" style="display:none;">✨</div>
      <h2>Media</h2>
      <div class="avg-wrap">
        <div>
          <div class="avg-score" id="avgScore">0.00</div>
          <p class="avg-msg" id="avgMsg">Añade notas para ver la animación.</p>
          <div class="chip"><span class="avg-badge" id="avgBadge">—</span></div>
        </div>
      </div>
      <div class="confetti" id="confetti"></div>
      <p class="muted" style="margin-top:12px;">
        Rangos: &lt;5 alerta · 5–6.9 ok · 7–8.9 bien · ≥9 excelente
      </p>
    </aside>
  </div>
</main>

<script>
  // Datos demo (puedes cargarlos desde tu BD)
  let grades = [
    { subject: "Matemáticas", type: "Examen", score: 6.5, weight: 60 },
    { subject: "Matemáticas", type: "Tarea",  score: 8.0, weight: 40 },
  ];

  const gradesBody = document.getElementById("gradesBody");
  const avgCard = document.getElementById("avgCard");
  const avgScoreEl = document.getElementById("avgScore");
  const avgMsgEl = document.getElementById("avgMsg");
  const avgBadgeEl = document.getElementById("avgBadge");
  const confettiEl = document.getElementById("confetti");
  const sparkleEl = document.getElementById("sparkle");

  function renderTable(){
    gradesBody.innerHTML = "";
    grades.forEach((g, idx) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${g.subject}</td>
        <td>${g.type}</td>
        <td>${Number(g.score).toFixed(2)}</td>
        <td>${g.weight}%</td>
        <td class="right">
          <button class="btn" data-del="${idx}">🗑️ Borrar</button>
        </td>
      `;
      gradesBody.appendChild(tr);
    });

    gradesBody.querySelectorAll("button[data-del]").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        const i = Number(e.currentTarget.getAttribute("data-del"));
        grades.splice(i,1);
        updateAll();
      });
    });
  }

  function calcAverage(){
    // Media ponderada global con pesos
    const totalW = grades.reduce((a,g)=>a + Number(g.weight||0), 0);
    if(totalW <= 0) return 0;
    const sum = grades.reduce((a,g)=> a + (Number(g.score||0) * Number(g.weight||0)), 0);
    return sum / totalW;
  }

  function setAvgAnimation(avg){
    // reset clases/efectos
    avgCard.classList.remove("avg-bad","avg-ok","avg-good","avg-excellent","anim");
    confettiEl.innerHTML = "";
    sparkleEl.style.display = "none";

    if(grades.length === 0){
      avgBadgeEl.textContent = "—";
      avgMsgEl.textContent = "Añade notas para ver la animación.";
      return;
    }

    if(avg < 5){
      avgCard.classList.add("avg-bad","anim");
      avgBadgeEl.textContent = "⚠️ Alerta";
      avgMsgEl.textContent = "Hay que reforzar. Haz un plan esta semana.";
    } else if(avg < 7){
      avgCard.classList.add("avg-ok","anim");
      avgBadgeEl.textContent = "✅ OK";
      avgMsgEl.textContent = "Vas bien. Un empujón más y subes mucho.";
    } else if(avg < 9){
      avgCard.classList.add("avg-good","anim");
      avgBadgeEl.textContent = "💪 Bien";
      avgMsgEl.textContent = "Muy buen nivel. Mantén el ritmo.";
      // confetti ligero
      spawnConfetti(18);
    } else {
      avgCard.classList.add("avg-excellent","anim");
      avgBadgeEl.textContent = "⭐ Excelente";
      avgMsgEl.textContent = "Top. Sigue así.";
      sparkleEl.style.display = "block";
      // confetti fuerte
      spawnConfetti(40);
    }
  }

  function spawnConfetti(n){
    // confetti simple con spans (sin librerías)
    const w = avgCard.clientWidth;
    for(let i=0;i<n;i++){
      const s = document.createElement("span");
      const left = Math.random() * (w - 10);
      const delay = Math.random() * 0.35;
      const duration = 1.2 + Math.random() * 0.9;
      const rotate = Math.floor(Math.random() * 360);

      // colores sin hardcodear "bonitos": usamos HSL aleatorio
      const hue = Math.floor(Math.random()*360);
      s.style.left = left + "px";
      s.style.animationDelay = delay + "s";
      s.style.animationDuration = duration + "s";
      s.style.transform = `rotate(${rotate}deg)`;
      s.style.background = `hsl(${hue} 85% 60%)`;
      confettiEl.appendChild(s);

      // limpiar después
      setTimeout(()=> s.remove(), (delay + duration) * 1000 + 200);
    }
  }

  function updateAll(){
    renderTable();
    const avg = calcAverage();
    avgScoreEl.textContent = avg.toFixed(2);
    setAvgAnimation(avg);
  }

  document.getElementById("addBtn").addEventListener("click", ()=>{
    const subj = document.getElementById("subj").value;
    const type = document.getElementById("type").value;
    const score = Number(document.getElementById("score").value);
    const weight = Number(document.getElementById("weight").value);

    if(!Number.isFinite(score) || score < 0 || score > 10) {
      alert("La nota debe estar entre 0 y 10.");
      return;
    }
    if(!Number.isFinite(weight) || weight <= 0 || weight > 100) {
      alert("El peso debe estar entre 1 y 100.");
      return;
    }

    grades.push({ subject: subj, type, score, weight });
    document.getElementById("score").value = "";
    document.getElementById("weight").value = "";
    updateAll();
  });

  updateAll();
</script>
</body>
</html>
